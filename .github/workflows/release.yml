# Builds the Veyr Mac app and CLI on a tagged release, attaches both to a
# single GitHub Release. Mirrors release-desktop.yml's build-then-centralize
# shape (letting each job publish itself raced to create duplicate release
# drafts there — same fix applies here).
#
# What this does NOT do: bump packages/homebrew-veyr's formula/cask
# version+sha256. That's a manual step for now — see
# scripts/bump-homebrew-tap.sh. Also does not sign/notarize the Mac app —
# CODEXBAR_SIGNING defaults to "adhoc" (see Scripts/package_app.sh); this
# project has no Apple Developer Program membership of its own yet.
#
# Trigger: push a tag matching v* whose number equals
# packages/desktop-mac/version.env's MARKETING_VERSION, e.g.
#     git tag v0.2.2 && git push --tags

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # manual build (no release; artifacts only)

permissions:
  contents: write

jobs:
  build-mac-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches version.env
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/desktop-mac
        run: |
          source version.env
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "$MARKETING_VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) doesn't match version.env's MARKETING_VERSION ($MARKETING_VERSION)." >&2
            exit 1
          fi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package Veyr.app (ad-hoc signed — no Developer ID available)
        working-directory: packages/desktop-mac
        env:
          CODEXBAR_SIGNING: adhoc
        run: ./Scripts/package_app.sh release

      - name: Build DMG
        working-directory: packages/desktop-mac
        run: ./Scripts/build-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: packages/desktop-mac/Veyr-*.dmg

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install
        working-directory: packages/cli
        run: npm ci

      # The Mac app and CLI version independently (packages/desktop-mac's
      # version.env vs packages/cli/package.json) — rather than requiring
      # both bumped in lockstep before every tag, the release tag IS the
      # CLI's published version. No-op on a manual workflow_dispatch run
      # (no tag).
      - name: Set CLI version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/cli
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build
        working-directory: packages/cli
        run: npm run build

      - name: Pack tarball (for sha256 reference; npm publish is the real artifact)
        working-directory: packages/cli
        run: npm pack --pack-destination "$RUNNER_TEMP"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-tarball
          path: ${{ runner.temp }}/getcanopy-*.tgz

      # Only runs once NPM_TOKEN is added as a repo secret — until then this
      # step is silently skipped rather than failing the whole workflow.
      - name: Publish to npm
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.NPM_TOKEN != '' }}
        working-directory: packages/cli
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

  release:
    needs: [build-mac-app, build-cli]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish single draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: artifacts/**/*
