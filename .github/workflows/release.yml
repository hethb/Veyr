# Builds the Veyr Mac app and CLI on a tagged release, attaches both to a
# single GitHub Release. Mirrors release-desktop.yml's build-then-centralize
# shape (letting each job publish itself raced to create duplicate release
# drafts there — same fix applies here).
#
# What this does NOT do: publish the CLI to npm — that moved to
# publish-cli.yml (cli-v* tags), because the Mac app and CLI version
# independently and this workflow's old tag-overrides-version approach could
# publish a CLI downgrade once the two diverged. The CLI tarball attached to
# the release here is built at whatever version packages/cli/package.json
# says. Also not done here: bumping packages/homebrew-veyr's formula/cask
# version+sha256 (manual — see scripts/bump-homebrew-tap.sh), and
# signing/notarizing the Mac app — CODEXBAR_SIGNING defaults to "adhoc" (see
# Scripts/package_app.sh); this project has no Apple Developer Program
# membership of its own yet.
#
# Trigger: push a tag matching v* whose number equals
# packages/desktop-mac/version.env's MARKETING_VERSION, e.g.
#     git tag v0.2.2 && git push --tags

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # manual build (no release; artifacts only)

permissions:
  contents: write

jobs:
  build-mac-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches version.env
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/desktop-mac
        run: |
          source version.env
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "$MARKETING_VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) doesn't match version.env's MARKETING_VERSION ($MARKETING_VERSION)." >&2
            exit 1
          fi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package Veyr.app (ad-hoc signed — no Developer ID available)
        working-directory: packages/desktop-mac
        env:
          CODEXBAR_SIGNING: adhoc
        run: ./Scripts/package_app.sh release

      - name: Build DMG
        working-directory: packages/desktop-mac
        run: ./Scripts/build-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: packages/desktop-mac/Veyr-*.dmg

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      # Root install: the lockfile lives at the workspace root, and the CLI
      # build bundles the @veyr/core workspace + the dashboard's embed target.
      - name: Install
        run: npm ci

      - name: Build
        working-directory: packages/cli
        run: npm run build

      - name: Pack tarball (for sha256 reference; npm publish is the real artifact)
        working-directory: packages/cli
        run: npm pack --pack-destination "$RUNNER_TEMP"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-tarball
          path: ${{ runner.temp }}/getcanopy-*.tgz

  release:
    needs: [build-mac-app, build-cli]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish single draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: artifacts/**/*
