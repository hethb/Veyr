# Builds the Veyr desktop app (Electron) for macOS, Windows, and Linux on
# native runners, then publishes every installer + auto-update metadata to a
# single GitHub Release.
#
# Two stages on purpose: each matrix job only BUILDS (--publish never) and
# uploads its installers as workflow artifacts; a final `release` job collects
# them and creates ONE draft release. Letting each electron-builder job publish
# itself raced to create duplicate drafts (GitHub's draft-by-tag matching is
# unreliable), so we centralize publishing here.
#
# Trigger: push a tag matching v* whose number equals packages/desktop's
# version, e.g.
#     npm version 0.1.2 -w @promptlens/desktop --no-git-tag-version
#     git commit -am "desktop v0.1.2" && git tag v0.1.2 && git push --tags
#
# Builds are UNSIGNED (no Apple/Windows certs). Review the draft and click
# "Publish release" to make it live (electron-updater serves published releases).

name: Release desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # manual build (no release; artifacts only)

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            flag: "--mac"
          - os: windows-latest
            flag: "--win"
          - os: ubuntu-latest
            flag: "--linux"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # better-sqlite3 compiles from source when no prebuilt binary matches the
      # runner's Node; node-gyp needs distutils, removed in Python 3.12+.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workspace dependencies
        run: npm ci

      - name: Build proxy + dashboard (bundled into the app)
        run: npm run build:deps -w @promptlens/desktop

      - name: Build + package (no publish)
        working-directory: packages/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # no signing certs in CI
        run: |
          npm run build
          npx electron-builder --publish never ${{ matrix.flag }}
        shell: bash

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            packages/desktop/dist-electron/*.dmg
            packages/desktop/dist-electron/*.zip
            packages/desktop/dist-electron/*.exe
            packages/desktop/dist-electron/*.AppImage
            packages/desktop/dist-electron/*.deb
            packages/desktop/dist-electron/*.yml
            packages/desktop/dist-electron/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # flatten every platform's files into one dir

      - name: Publish single draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: artifacts/**/*
