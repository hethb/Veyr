<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Welcome to PromptLens</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      padding: 40px 44px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0f17;
      color: #e6e9ef;
    }
    h1 { font-size: 22px; margin: 0 0 6px; }
    p.sub { color: #8b93a3; margin: 0 0 28px; font-size: 14px; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: #8b93a3; margin: 24px 0 8px; }
    pre {
      position: relative;
      background: #131a26;
      border: 1px solid #232c3d;
      border-radius: 8px;
      padding: 14px 16px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12.5px;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 1px solid #2c3850;
      background: #1a2436;
      color: #aab4c6;
      border-radius: 6px;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .copy-btn:hover { background: #233049; }
    .open-btn {
      margin-top: 32px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .open-btn:hover { background: #2f6fe0; }
  </style>
</head>
<body>
  <h1>PromptLens is running on your machine 🎉</h1>
  <p class="sub">The local proxy is up. Point your LLM calls at it and every request, token, and dollar shows up in the dashboard.</p>

  <h2>Your demo API key</h2>
  <pre id="key-block"><button class="copy-btn" data-copy="key">Copy</button><code id="key-text"></code></pre>

  <h2>Add to your code (2 lines)</h2>
  <pre id="snippet-block"><button class="copy-btn" data-copy="snippet">Copy</button><code id="snippet-text"></code></pre>

  <button class="open-btn" id="open-dashboard">Open Dashboard</button>

  <script>
    const params = new URLSearchParams(location.search);
    const key = params.get("key") || "(no key minted — open the dashboard to create one)";
    const url = params.get("url") || "http://localhost:3001";

    const snippet =
      'import { promptlensOpenAI } from "@promptlens/sdk";\n' +
      'const openai = new OpenAI(promptlensOpenAI({ apiKey: process.env.OPENAI_API_KEY, baseUrl: "' +
      url + '", promptlensKey: "' + key + '" }));';

    document.getElementById("key-text").textContent = key;
    document.getElementById("snippet-text").textContent = snippet;

    for (const btn of document.querySelectorAll(".copy-btn")) {
      btn.addEventListener("click", async () => {
        const text = btn.dataset.copy === "key" ? key : snippet;
        await navigator.clipboard.writeText(text);
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = "Copy"), 1500);
      });
    }

    document.getElementById("open-dashboard").addEventListener("click", () => window.close());
  </script>
</body>
</html>
