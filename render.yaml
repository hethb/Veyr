# Render Blueprint for the Veyr proxy (Node/Express).
# Dashboard is deployed separately on Vercel.
#
# After first deploy, point DASHBOARD_ORIGIN at your Vercel URL, then run
# `npm run seed` (or create a key in the dashboard) once to mint an API key.
services:
  - type: web
    name: promptlens-proxy
    runtime: node
    plan: starter # a paid plan is required for a persistent disk
    branch: main
    # Install dev deps (typescript) so the build can run, then compile.
    buildCommand: npm install --include=dev && npm run build:proxy
    startCommand: node packages/proxy/dist/index.js
    healthCheckPath: /health
    # Persistent disk for the SQLite store (keys + request logs).
    disk:
      name: promptlens-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      # OpenAI-compatible upstream. Currently Groq (free tier).
      - key: OPENAI_UPSTREAM_URL
        value: https://api.groq.com/openai/v1/chat/completions
      - key: STORE_PROMPTS
        value: "false"
      # SQLite location on the mounted disk so data survives deploys.
      - key: VEYR_DB_PATH
        value: /var/data/promptlens.db
      # Comma-separated allowed dashboard origins (your Vercel URL).
      # Set this after the dashboard is deployed.
      - key: DASHBOARD_ORIGIN
        sync: false
